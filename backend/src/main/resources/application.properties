spring.application.name=coworking-system

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/coworking_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret & Expiration
coworking.app.jwtSecret=guviCoworkingSecretKeyForJwtAuthenticationWhichIsVeryLongAndSecure
coworking.app.jwtExpirationMs=86400000

# Server
server.port=8080
